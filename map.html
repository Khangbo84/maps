<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Maps | K Games Legends</title>

  <style>
    :root {
      --bg: #ffffff;
      --card-bg: #ffffff;
      --text-main: #1e1e2f;
      --text-sub: #6b6b8a;
      --border: #e5e5e5;
      --shadow: 0 10px 24px rgba(0,0,0,.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
    }

    header {
      padding: 24px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
    }

    header p {
      margin-top: 6px;
      color: var(--text-sub);
      font-size: 14px;
    }

    /* ===== Controls ===== */
    .controls {
      display: flex;
      gap: 12px;
      padding: 0 24px 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls input,
    .controls select {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
    }

    /* ===== Grid ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      padding: 0 24px 40px;
    }

    /* ===== Card ===== */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 36px rgba(0,0,0,.12);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .card-body h3 {
      font-size: 16px;
      margin-bottom: 6px;
    }

    .card-body p {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    /* ===== Type badge ===== */
    .type {
      display: inline-block;
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 999px;
      font-weight: 600;
      color: #fff;
    }

    .parkours   { background: #00bcd4; }
    .landscape  { background: #8bc34a; }
    .minigames  { background: #ff9800; }
    .adventure  { background: #4caf50; }

    footer {
      border-top: 1px solid var(--border);
      padding: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--text-sub);
    }
   /* ===== Popup ===== */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.popup.show {
  display: flex;
}

.popup-content {
  background: #fff;
  border-radius: 16px;
  max-width: 720px;
  width: 90%;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
  animation: pop .25s ease;
}

@keyframes pop {
  from { transform: scale(.95); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.popup-content img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

.popup-body {
  padding: 20px;
}

.popup-body h2 {
  margin: 10px 0 6px;
}

.popup-body p {
  color: var(--text-sub);
  font-size: 14px;
  margin-bottom: 16px;
}

.close {
  position: absolute;
  right: 16px;
  top: 12px;
  font-size: 22px;
  cursor: pointer;
  user-select: none;
}

/* ===== Popup upgrade ===== */
.popup-cover {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  margin: 16px 0;
}

.gallery img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
}

.version {
  margin: 14px 0 18px;
  font-size: 14px;
  color: var(--text-sub);
}

.version strong {
  color: var(--text-main);
}

.download {
  display: inline-block;
  padding: 12px 22px;
  background: #1e1e2f;
  color: #fff;
  border-radius: 12px;
  text-decoration: none;
  font-size: 14px;
}
  </style>
</head>
<body>

  <header>
    <h1>Minecraft Maps</h1>
    <p>Custom maps created by K Games Legends</p>
  </header>

  <!-- ===== Controls ===== -->
  <div class="controls">
    <input id="search" type="text" placeholder="Search maps..." />
    <select id="filter">
      <option value="all">All Types</option>
      <option value="parkours">Parkours</option>
      <option value="landscape">Landscape</option>
      <option value="minigames">Minigames</option>
      <option value="adventure">Adventure</option>
    </select>
  </div>
<!-- ===== Popup ===== -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close" id="closePopup">✕</span>

    <!-- Cover -->
    <img id="popupCover" class="popup-cover" src="" alt="">

    <div class="popup-body">
      <span id="popupType" class="type"></span>
      <h2 id="popupTitle"></h2>
      <p id="popupDesc"></p>

      <!-- Gallery -->
      <div id="popupGallery" class="gallery"></div>

      <!-- Version -->
      <div class="version">
        <strong>Recommended version:</strong>
        <span id="popupVersion"></span>
      </div>

      <!-- Download -->
      <a id="popupDownload" class="download" href="#" target="_blank">
        Download Map
      </a>
    </div>
  </div>
</div>

  <!-- ===== Grid ===== -->
  <div class="grid" id="grid"></div>

  <footer>
    © 2025 K Games Legends
  </footer>

  <script>
    let maps = [];

    fetch("maps.json")
      .then(res => res.json())
      .then(data => {
        maps = data;
        render(maps);
      });

    const grid = document.getElementById("grid");
    const search = document.getElementById("search");
    const filter = document.getElementById("filter");
    const popup = document.getElementById("popup");
    const popupImage = document.getElementById("popupImage");
    const popupTitle = document.getElementById("popupTitle");
    const popupDesc = document.getElementById("popupDesc");
    const popupType = document.getElementById("popupType");
    const popupDownload = document.getElementById("popupDownload");
    const closePopup = document.getElementById("closePopup");
    const popupCover = document.getElementById("popupCover");
    const popupGallery = document.getElementById("popupGallery");
    const popupVersion = document.getElementById("popupVersion");

function openPopup(map) {
  popupCover.src = map.image;
  popupTitle.textContent = map.title;
  popupDesc.textContent = map.desc;

  popupType.textContent = map.type.toUpperCase();
  popupType.className = "type " + map.type;

  popupVersion.textContent = map.version || "Latest version";
  popupDownload.href = map.download || "#";

  // Render gallery
  popupGallery.innerHTML = "";
  if (map.gallery && map.gallery.length > 0) {
    map.gallery.forEach(img => {
      const el = document.createElement("img");
      el.src = img;
      el.alt = map.title;
      popupGallery.appendChild(el);
    });
  }

  popup.classList.add("show");
}

closePopup.addEventListener("click", () => {
  popup.classList.remove("show");
});

popup.addEventListener("click", e => {
  if (e.target === popup) popup.classList.remove("show");
});

function render(list) {
  grid.innerHTML = "";
  list.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${m.image}" alt="${m.title}">
      <div class="card-body">
        <span class="type ${m.type}">${m.type.toUpperCase()}</span>
        <h3>${m.title}</h3>
        <p>${m.desc}</p>
      </div>
    `;

    card.addEventListener("click", () => openPopup(m));
    grid.appendChild(card);
  });
}

    function applyFilter() {
      const q = search.value.toLowerCase();
      const t = filter.value;

      const result = maps.filter(m => {
        const matchText =
          m.title.toLowerCase().includes(q) ||
          m.desc.toLowerCase().includes(q);

        const matchType = t === "all" || m.type === t;
        return matchText && matchType;
      });

      render(result);
    }

    search.addEventListener("input", applyFilter);
    filter.addEventListener("change", applyFilter);
  </script>

</body>
</html>
